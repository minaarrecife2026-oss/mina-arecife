<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brous Investments SAS — Sistema de Inventario</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
--bg:#0B0F1A; --surface:#111827; --card:#1A2235; --card2:#1F2A40;
--border:#263047; --border2:#2E3D58;
--gold:#F5A623; --gold2:#E8630A; --gold-dim:rgba(245,166,35,0.12);
--green:#22C55E; --green-dim:rgba(34,197,94,0.12);
--red:#EF4444; --red-dim:rgba(239,68,68,0.12);
--blue:#3B82F6; --blue-dim:rgba(59,130,246,0.12);
--text:#E8EDF5; --text2:#9BAABF; --text3:#5C6E87;
--font-h:'Oswald',sans-serif; --font-b:'Source Sans 3',sans-serif;
--r2:14px; --shadow:0 4px 24px rgba(0,0,0,0.4);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;font-size:14px;}
/* Estilos base del sistema */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;}
.loading-logo{font-family:var(--font-h);font-size:38px;font-weight:700;color:var(--gold);letter-spacing:3px;}
.loading-bar{width:200px;height:3px;background:var(--border2);overflow:hidden;}
.loading-fill{height:100%;background:var(--gold);animation:loadfill 1.5s infinite;}
@keyframes loadfill{0%{width:0;margin-left:0}50%{width:60%;margin-left:0}100%{width:0;margin-left:200px}}
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 20% 50%,#1a2e10 0%,#0B0F1A 70%);}
.lbox{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:44px;width:min(400px,95vw);box-shadow:var(--shadow);}
.lbox input, .lbox select{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:12px;margin-bottom:20px;outline:none;}
.lbtn{width:100%;background:linear-gradient(135deg,var(--gold2),var(--gold));border:none;color:#000;font-family:var(--font-h);font-size:19px;font-weight:700;padding:14px;border-radius:8px;cursor:pointer;}
#app{display:none;min-height:100vh;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:200;}
.sidebar{width:225px;background:var(--surface);border-right:1px solid var(--border);padding:16px 10px;height:calc(100vh - 58px);position:sticky;top:58px;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--text2);margin-bottom:2px;}
.ni.active, .ni:hover{background:var(--gold-dim);color:var(--gold);}
.main{flex:1;padding:20px;overflow-x:hidden;}
.page{display:none;} .page.active{display:block;}
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:24px;}
.kcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px;border-left:4px solid var(--gold);}
.twrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;}
th{background:var(--card2);color:var(--text3);padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;}
td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.04);}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.b-green{background:var(--green-dim);color:var(--green);} .b-red{background:var(--red-dim);color:var(--red);}
</style>
</head>
<body>

<div id="loading">
<div class="loading-logo">BROUS INVESTMENTS SAS</div>
<div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<div id="login">
<div class="lbox">
<h2 style="font-family:var(--font-h);color:var(--gold);text-align:center;margin-bottom:20px;">MINA ARRECIFE</h2>
<input type="text" id="l-user" placeholder="admin / secretaria / invitado">
<input type="password" id="l-pass" placeholder="Contraseña">
<select id="l-role">
<option value="admin">Administrador</option>
<option value="secretaria">Secretaria</option>
<option value="invitado">Invitado</option>
</select>
<button class="lbtn" onclick="doLogin()">INGRESAR</button>
<div id="lerr" style="color:var(--red);text-align:center;margin-top:15px;display:none;">Datos incorrectos</div>
</div>
</div>

<div id="app">
<div class="topbar">
<div style="font-family:var(--font-h);color:var(--gold);font-size:20px;">MINA ARRECIFE</div>
<div style="display:flex;align-items:center;gap:15px;">
<div id="top-user" style="font-size:13px;font-weight:600;"></div>
<button onclick="location.reload()" style="background:transparent;border:1px solid var(--border);color:var(--text3);padding:4px 10px;border-radius:6px;cursor:pointer;">Salir</button>
</div>
</div>
<div class="layout">
<div class="sidebar">
<div class="ni active" onclick="go('dashboard')">📊 Dashboard</div>
<div class="ni" onclick="go('cartera')">💳 Cartera</div>
<div class="ni" onclick="go('movimientos')">📋 Remisiones</div>
<div class="ni" onclick="go('nueva-venta')">🧾 Nueva Venta</div>
</div>
<div class="main">
<div class="page active" id="page-dashboard">
<h1 style="font-family:var(--font-h);margin-bottom:20px;">Panel de Control</h1>
<div class="kgrid" id="dash-kpi"></div>
<div class="twrap">
<div style="padding:15px;font-weight:700;border-bottom:1px solid var(--border)">Últimas Ventas</div>
<table><thead><tr><th>Fecha</th><th>Cliente</th><th>Total</th><th>Estado</th></tr></thead><tbody id="dash-ventas"></tbody></table>
</div>
</div>
<div class="page" id="page-cartera">
<h1 style="font-family:var(--font-h);margin-bottom:20px;">Cartera Pendiente</h1>
<div class="twrap"><table><thead><tr><th>Fecha</th><th>Cliente</th><th>Saldo Pendiente</th><th>Acción</th></tr></thead><tbody id="tbl-cartera"></tbody></table></div>
</div>
<div class="page" id="page-nueva-venta">
<h1 style="font-family:var(--font-h);margin-bottom:20px;">Nueva Remisión</h1>
<div style="background:var(--card);padding:25px;border-radius:12px;border:1px solid var(--border);">
<input type="text" id="v-nombre" placeholder="Nombre del Cliente" style="width:100%;padding:12px;margin-bottom:15px;background:var(--bg);color:white;border:1px solid var(--border);border-radius:8px;">
<input type="number" id="v-total" placeholder="Valor Total $" style="width:100%;padding:12px;margin-bottom:15px;background:var(--bg);color:white;border:1px solid var(--border);border-radius:8px;">
<select id="v-fpago" style="width:100%;padding:12px;margin-bottom:15px;background:var(--bg);color:white;border:1px solid var(--border);border-radius:8px;">
<option value="Efectivo">Efectivo</option>
<option value="Cartera">Cartera (Crédito)</option>
</select>
<button class="lbtn" onclick="registrarVenta()">GUARDAR REMISIÓN</button>
</div>
</div>
</div>
</div>
</div>

<script type="module">
import { initializeApp } from '
